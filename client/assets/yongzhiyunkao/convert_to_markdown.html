<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>练习题 Word 导出助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            max-width: 1200px;
            width: 100%;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.2em;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 1.05em;
        }
        
        .main {
            padding: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        
        .left-panel, .right-panel {
            min-width: 0;
        }
        
        @media (max-width: 768px) {
            .main {
                grid-template-columns: 1fr;
            }
        }
        
        .section {
            background: #ffffff;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid #f0f0f0;
        }
        
        .section-title {
            font-size: 1.25em;
            color: #1a202c;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }
        
        .upload-area {
            border: 2px dashed #4facfe;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: #f8fafc;
        }
        
        .upload-area:hover {
            border-color: #00f2fe;
            background: #f0f9ff;
            transform: translateY(-2px);
        }
        
        .upload-area.dragover {
            background: #e0f2fe;
            border-color: #0284c7;
        }
        
        .upload-icon {
            font-size: 3.5em;
            margin-bottom: 15px;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .file-info {
            margin-top: 20px;
            padding: 15px;
            background: #f0f9ff;
            border-radius: 12px;
            display: none;
            border: 1px solid #bae6fd;
            color: #0369a1;
            word-break: break-all;
            overflow-wrap: break-word;
        }
        
        .options {
            margin-top: 20px;
        }
        
        .option-group {
            margin-bottom: 15px;
        }
        
        label {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            user-select: none;
            color: #4a5568;
        }
        
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #0ea5e9;
        }
        
        .convert-btn {
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            padding: 16px 30px;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 25px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.3);
        }
        
        .convert-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(14, 165, 233, 0.4);
        }
        
        .convert-btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            box-shadow: none;
        }
        
        .preview-area {
            background: #fafafa;
            border-radius: 12px;
            padding: 25px;
            height: 480px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
        }
        
        .preview-area::-webkit-scrollbar {
            width: 6px;
        }
        
        .preview-area::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .preview-area::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        
        .preview-area::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        
        .download-section {
            margin-top: 25px;
            display: flex;
            gap: 15px;
        }
        
        .download-btn, .copy-btn {
            flex: 1;
            padding: 14px 20px;
            border-radius: 12px;
            border: none;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        
        .download-btn {
            background: #10b981;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2);
        }
        
        .download-btn:hover {
            background: #059669;
            transform: translateY(-1px);
        }
        
        .copy-btn {
            background: #3b82f6;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2);
        }
        
        .copy-btn:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .stat-card {
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }
        
        .stat-number {
            font-size: 1.8em;
            font-weight: 700;
            color: #0284c7;
        }
        
        .stat-label {
            color: #64748b;
            font-size: 0.85em;
            margin-top: 4px;
        }
        
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1e293b;
            color: white;
            padding: 16px 32px;
            border-radius: 50px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            font-weight: 500;
        }
        
        .toast.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✨ 练习题 Word 导出助手</h1>
            <p>融智云考提取 JSON 转换为 Word 可用格式的富文本工具</p>
        </div>
        
        <div class="main">
            <div class="left-panel">
                <div class="section">
                    <h2 class="section-title">
                        <span>📤</span>
                        上传 JSON 文件
                    </h2>
                    
                    <div class="upload-area" id="uploadArea">
                        <div class="upload-icon">📄</div>
                        <p style="color: #334155; font-size: 1.1em; margin-bottom: 8px;"><strong>点击选择文件</strong> 或 <strong>拖拽至此</strong></p>
                        <p style="color: #94a3b8; font-size: 0.9em;">仅支持 .json 格式文件</p>
                        <input type="file" id="fileInput" accept=".json">
                    </div>
                    
                    <div class="file-info" id="fileInfo">
                        <p style="margin-bottom: 4px;"><strong>📄</strong> <span id="fileName"></span></p>
                        <p style="font-size: 0.9em;">大小：<span id="fileSize"></span></p>
                    </div>
                    
                    <div class="stats" id="stats" style="display: none;">
                        <div class="stat-card">
                            <div class="stat-number" id="totalQuestions">0</div>
                            <div class="stat-label">总题数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number" id="totalScore">0</div>
                            <div class="stat-label">总分值</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number" id="chapterCount">0</div>
                            <div class="stat-label">章节数</div>
                        </div>
                    </div>
                </div>
                
                <div class="section" style="margin-top: 25px;">
                    <h2 class="section-title">
                        <span>⚙️</span>
                        输出选项
                    </h2>
                    
                    <div class="options">
                        <div class="option-group">
                            <label>
                                <input type="checkbox" id="includeStats" checked>
                                <span>生成统计信息表头</span>
                            </label>
                        </div>
                        <div class="option-group">
                            <label>
                                <input type="checkbox" id="markCorrectAnswers" checked>
                                <span>高亮标记正确答案</span>
                            </label>
                        </div>
                        <div class="option-group">
                            <label>
                                <input type="checkbox" id="groupByChapter" checked>
                                <span>按章节分类排版</span>
                            </label>
                        </div>
                    </div>
                    
                    <button class="convert-btn" id="convertBtn" disabled>
                        开始转换为 Word 格式
                    </button>
                </div>
            </div>
            
            <div class="right-panel">
                <div class="section">
                    <h2 class="section-title">
                        <span>👁️</span>
                        效果预览
                    </h2>
                    
                    <div class="preview-area" id="preview">
                        <div style="color: #94a3b8; text-align: center; margin-top: 200px;">
                            请先在左侧上传 JSON 题库文件
                        </div>
                    </div>
                    
                    <div class="download-section" id="downloadSection" style="display: none;">
                        <button class="copy-btn" id="copyBtn">
                            📋 一键复制（去 Word 粘贴）
                        </button>
                        <button class="download-btn" id="downloadBtn">
                            📥 导出 .html 文件
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        let questionsData = null;
        let htmlContent = '';
        
        // DOM 元素
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const convertBtn = document.getElementById('convertBtn');
        const preview = document.getElementById('preview');
        const downloadSection = document.getElementById('downloadSection');
        const downloadBtn = document.getElementById('downloadBtn');
        const copyBtn = document.getElementById('copyBtn');
        const toast = document.getElementById('toast');
        const stats = document.getElementById('stats');
        
        // 阻止浏览器默认的拖拽行为，防止拖拽到非指定区域时浏览器直接打开文件
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            document.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        // 文件上传处理
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });
        
        function handleFile(file) {
            if (!file.name.endsWith('.json')) {
                showToast('请上传 JSON 格式的文件！', 'error');
                return;
            }
            
            fileName.textContent = file.name;
            fileSize.textContent = formatFileSize(file.size);
            fileInfo.style.display = 'block';
            
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    questionsData = JSON.parse(e.target.result);
                    convertBtn.disabled = false;
                    showToast('文件解析成功！');
                    updateStats();
                } catch (error) {
                    showToast('JSON 格式解析错误！', 'error');
                    console.error(error);
                }
            };
            reader.readAsText(file);
        }
        
        function updateStats() {
            if (!questionsData) return;
            
            const totalQuestions = questionsData.length;
            let totalScore = 0;
            const chapters = new Set();
            
            questionsData.forEach(q => {
                totalScore += parseFloat(q.score || 0);
                if (q.chapter) chapters.add(q.chapter);
            });
            
            document.getElementById('totalQuestions').textContent = totalQuestions;
            document.getElementById('totalScore').textContent = totalScore;
            document.getElementById('chapterCount').textContent = chapters.size;
            stats.style.display = 'grid';
        }
        
        convertBtn.addEventListener('click', () => {
            if (!questionsData) return;
            
            try {
                const options = {
                    includeStats: document.getElementById('includeStats').checked,
                    markCorrectAnswers: document.getElementById('markCorrectAnswers').checked,
                    groupByChapter: document.getElementById('groupByChapter').checked
                };
                
                htmlContent = convertToHtml(questionsData, options);
                preview.innerHTML = htmlContent;
                downloadSection.style.display = 'flex';
                showToast('转换完成！可以复制啦~');
            } catch (err) {
                console.error("转换失败:", err);
                alert("转换时发生错误: " + err.message + "\n请按 F12 打开控制台查看详细报错。");
            }
        });
        
        function convertToHtml(questions, options) {
            let html = ['<div style="font-family: \'Microsoft YaHei\', SimSun, sans-serif; line-height: 1.8; color: #000; font-size: 14pt;">'];
            
            // 标题
            const timestamp = new Date().toLocaleString('zh-CN');
            html.push(`<h1 style="text-align: center; font-size: 24pt; margin-bottom: 20px;">练习题整理</h1>`);
            html.push(`<p style="color: #666; font-size: 12pt; text-align: center; margin-bottom: 30px;">生成时间：${timestamp} &nbsp;|&nbsp; 题目总数：${questions.length} 题</p>`);
            
            // 统计信息
            if (options.includeStats) {
                html.push(generateHtmlStatistics(questions));
            }
            
            // 题目内容
            html.push('<h2 style="font-size: 18pt; border-bottom: 2px solid #000; padding-bottom: 10px; margin-top: 30px; margin-bottom: 20px;">📝 题目详情</h2>');
            
            if (options.groupByChapter) {
                const chapters = {};
                questions.forEach(q => {
                    const chapter = q.chapter || '未分类';
                    if (!chapters[chapter]) chapters[chapter] = [];
                    chapters[chapter].push(q);
                });
                
                Object.keys(chapters).sort().forEach(chapter => {
                    if (Object.keys(chapters).length > 1) {
                        html.push(`<h3 style="font-size: 16pt; color: #1f4e79; margin-top: 25px; margin-bottom: 15px; font-weight: bold;">📚 ${chapter}</h3>`);
                    }
                    chapters[chapter].forEach(q => {
                        html.push(formatHtmlQuestion(q, options.markCorrectAnswers));
                    });
                });
            } else {
                questions.forEach(q => {
                    html.push(formatHtmlQuestion(q, options.markCorrectAnswers));
                });
            }
            
            html.push('</div>');
            return html.join('\n');
        }
        
        function formatHtmlQuestion(question, markCorrect) {
            let html = ['<div style="margin-bottom: 30px; padding: 15px; border: 1px solid #d9d9d9; border-radius: 8px;">'];
            
            // 题目标题
            let title = `<b>${question.index || '?'}.</b> `;
            if (question.questionType) {
                title += `<span style="color: #2f5597;">【${question.questionType}】</span>`;
            }
            if (question.score) {
                title += `<span style="color: #595959; font-size: 12pt;">（${question.score}分）</span>`;
            }
            html.push(`<div style="margin-bottom: 10px; font-size: 14pt;">${title}</div>`);
            
            // 章节
            if (question.chapter) {
                html.push(`<div style="font-size: 12pt; color: #595959; margin-bottom: 10px;"><b>章节：</b> ${question.chapter}</div>`);
            }
            
            // 题目内容
            if (question.question) {
                html.push(`<div style="margin-bottom: 15px;"><b>题目：</b><br/>${question.question}</div>`);
            }
            
            // 选项
            if (question.options && question.options.length > 0) {
                html.push('<div style="margin-bottom: 15px;"><b>选项：</b>');
                question.options.forEach(opt => {
                    const isCorrect = markCorrect && question.answer && question.answer.includes(opt.label);
                    const optStyle = isCorrect ? 'color: #38761d; font-weight: bold; background: #e8f5e9; padding: 5px; border-radius: 4px; display: inline-block; width: 100%; box-sizing: border-box;' : 'padding: 5px; display: inline-block; width: 100%; box-sizing: border-box;';
                    const checkMark = isCorrect ? ' ✓' : '';
                    html.push(`<div style="${optStyle}">${opt.label}. ${opt.text}${checkMark}</div>`);
                });
                html.push('</div>');
            }
            
            // 答案
            if (question.answer) {
                html.push(`<div style="margin-bottom: 10px; color: #cc0000;"><b>答案：</b> ${question.answer}</div>`);
            }
            
            // 解析
            if (question.analysis && question.analysis.trim()) {
                html.push(`<div style="padding: 10px; background: #fff2cc; border-left: 4px solid #f1c232; color: #7f6000; font-size: 12pt;"><b>解析：</b><br/>${question.analysis}</div>`);
            }
            
            html.push('</div>');
            return html.join('\n');
        }
        
        function generateHtmlStatistics(questions) {
            let html = ['<div style="margin-bottom: 30px; padding: 20px; background: #f2f2f2; border-radius: 8px;">'];
            html.push('<h2 style="font-size: 16pt; margin-bottom: 15px; color: #000; border-bottom: 1px solid #bfbfbf; padding-bottom: 10px;">📊 统计信息</h2>');
            
            const typeCount = {};
            const typeScore = {};
            questions.forEach(q => {
                const type = q.questionType || '未知';
                typeCount[type] = (typeCount[type] || 0) + 1;
                typeScore[type] = (typeScore[type] || 0) + parseFloat(q.score || 0);
            });
            
            html.push('<p style="margin-bottom: 5px;"><b>题型分布：</b></p><ul style="list-style-type: disc; margin-left: 30px; margin-bottom: 15px;">');
            Object.keys(typeCount).sort().forEach(type => {
                html.push(`<li><b>${type}：</b> ${typeCount[type]} 题（${typeScore[type]} 分）</li>`);
            });
            html.push('</ul>');
            
            const totalScore = Object.values(typeScore).reduce((a, b) => a + b, 0);
            html.push(`<p style="margin-bottom: 15px;"><b>总分值：</b> ${totalScore} 分</p>`);
            
            const chapterCount = {};
            questions.forEach(q => {
                const chapter = q.chapter || '未分类';
                chapterCount[chapter] = (chapterCount[chapter] || 0) + 1;
            });
            
            if (Object.keys(chapterCount).length > 1) {
                html.push('<p style="margin-bottom: 5px;"><b>章节分布：</b></p><ul style="list-style-type: disc; margin-left: 30px;">');
                Object.keys(chapterCount).sort().forEach(chapter => {
                    html.push(`<li><b>${chapter}：</b> ${chapterCount[chapter]} 题</li>`);
                });
                html.push('</ul>');
            }
            
            html.push('</div>');
            return html.join('\n');
        }
        
        // 复制按钮
        copyBtn.addEventListener('click', async () => {
            try {
                const blobHtml = new Blob([htmlContent], { type: 'text/html' });
                const blobText = new Blob([preview.innerText], { type: 'text/plain' });
                const data = [new ClipboardItem({ 'text/html': blobHtml, 'text/plain': blobText })];
                await navigator.clipboard.write(data);
                showToast('✅ 已复制！可以直接去 Word 中粘贴啦~');
            } catch (err) {
                const range = document.createRange();
                range.selectNodeContents(preview);
                const selection = window.getSelection();
                selection.removeAllRanges();
                selection.addRange(range);
                document.execCommand('copy');
                selection.removeAllRanges();
                showToast('✅ 已复制！可以直接去 Word 中粘贴啦~');
            }
        });
        
        // 导出为 HTML 文件
        downloadBtn.addEventListener('click', () => {
            const htmlExport = `
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>练习题整理</title>
</head>
<body>
    ${htmlContent}
</body>
</html>`;
            const blob = new Blob([htmlExport], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `练习题_${new Date().getTime()}.html`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('✅ 导出成功！');
        });
        
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / 1024 / 1024).toFixed(2) + ' MB';
        }
        
        function showToast(message, type = 'success') {
            toast.textContent = message;
            if (type === 'error') {
                toast.style.background = '#ef4444';
            } else {
                toast.style.background = '#1e293b';
            }
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
