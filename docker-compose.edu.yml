services:
  python-edu-service:
    build:
      context: ./python-edu-service
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:?INTERNAL_SERVICE_KEY is required}
      EDU_CREDENTIAL_KEY: ${EDU_CREDENTIAL_KEY:?EDU_CREDENTIAL_KEY is required}
      DATABASE_URL: sqlite+aiosqlite:///./database/edu.db
    volumes:
      - ./python-edu-service/database:/app/database
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 6
