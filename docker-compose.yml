services:
  # Nginx反向代理 - 统一入口
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - shenliyuan_network

  # Go后端服务
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - DSN=${DSN:-/app/shenliyuan.db}
      - UPLOAD_DIR=${UPLOAD_DIR:-/app/uploads}
      - SUPER_ADMIN_DEFAULT_PASSWORD=${SUPER_ADMIN_DEFAULT_PASSWORD}
      - GIN_MODE=release
    volumes:
      - server_data:/app
    restart: unless-stopped
    networks:
      - shenliyuan_network

  # 前端静态文件服务
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - shenliyuan_network

volumes:
  server_data:

networks:
  shenliyuan_network:
    driver: bridge
