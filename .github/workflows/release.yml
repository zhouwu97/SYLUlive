name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号 (如 1.4.10)'
        required: true
      notes:
        description: '更新日志'
        required: false
        default: '新版本发布'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 必须要有这行才能自动创建 Release 和上传附件

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          cd client
          flutter pub get

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > client/android/app/key.jks

      - name: Set keystore properties
        run: |
          cd client/android/app
          cat > key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}
          keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}
          storeFile=key.jks
          EOF

      - name: Build APK
        run: |
          cd client
          flutter build apk --release

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: v${{ github.event.inputs.version }} 正式版
          body: ${{ github.event.inputs.notes }}
          files: client/build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          # 可以使用默认的 GITHUB_TOKEN，无需自己申请。
          # 如果遇到权限问题，请在仓库 Settings -> Actions -> General -> Workflow permissions 中选中 Read and write permissions。
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python for Gitee Release
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Python dependencies
        run: pip install requests

      - name: Upload to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
          NOTES: ${{ github.event.inputs.notes }}
        run: |
          python -c "
          import os, requests, sys
          gitee_token = os.environ.get('GITEE_TOKEN')
          version = os.environ.get('VERSION')
          notes = os.environ.get('NOTES')
          repo = 'chunhezi/SYLUlive'
          apk_path = 'client/build/app/outputs/flutter-apk/app-release.apk'
          
          if not gitee_token:
              print('未配置 GITEE_TOKEN，跳过 Gitee 发布')
              sys.exit(0)
              
          print('⏳ 正在发布到 Gitee...')
          release_data = {
              'access_token': gitee_token,
              'tag_name': f'v{version}',
              'name': f'v{version} 正式版',
              'body': notes,
              'prerelease': False
          }
          resp = requests.post(f'https://gitee.com/api/v5/repos/{repo}/releases', data=release_data)
          if resp.status_code != 201:
              print(f'❌ Gitee Release 创建失败: {resp.text}')
              sys.exit(1)
              
          release_id = resp.json()['id']
          print('⏳ 正在上传 APK 到 Gitee...')
          files = {'file': (f'shenliyuan-v{version}.apk', open(apk_path, 'rb'), 'application/vnd.android.package-archive')}
          data = {'access_token': gitee_token}
          upload_resp = requests.post(f'https://gitee.com/api/v5/repos/{repo}/releases/{release_id}/attach_files', data=data, files=files)
          if upload_resp.status_code == 201:
              print('✅ Gitee 发布成功！')
          else:
              print(f'❌ Gitee APK 上传失败: {upload_resp.text}')
              sys.exit(1)
          "
