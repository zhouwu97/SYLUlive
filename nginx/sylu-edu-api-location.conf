# Add this location inside the HTTPS server block for sylu.zhouwu.ccwu.cc.
# It makes the web app call /edu-api/... on the same HTTPS origin, then nginx
# forwards the request to the Python edu service at http://101.42.27.44:8000.
location /edu-api/ {
    proxy_pass http://101.42.27.44:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 120s;
}
