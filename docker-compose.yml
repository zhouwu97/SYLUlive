services:
  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres_change_me}
      - POSTGRES_DB=shenliyuan
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - shenliyuan_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5



  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-this}
      - DSN=${DSN:-host=postgres port=5432 user=postgres password=${DB_PASSWORD:-postgres_change_me} dbname=shenliyuan sslmode=disable}
      - UPLOAD_DIR=${UPLOAD_DIR:-/app/uploads}
      - SUPER_ADMIN_ID=${SUPER_ADMIN_ID:-1234567890}
      - SUPER_ADMIN_PASSWORD=${SUPER_ADMIN_PASSWORD:-super_admin_password_change_this}
      - EDU_SERVICE_URL=http://python-edu-service:8000
      - GIN_MODE=release
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - server_data:/app/uploads
    restart: unless-stopped
    networks:
      - shenliyuan_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/docker.conf:/etc/nginx/conf.d/default.conf
      - ./client/build/web:/usr/share/nginx/html
    depends_on:
      - server
    networks:
      - shenliyuan_network

volumes:
  server_data:
  postgres_data:

networks:
  shenliyuan_network:
    driver: bridge
