name: Android Build

on:
  workflow_dispatch:
  push:
    branches: [fwqtest]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Flutter pub get
        run: flutter pub get
        working-directory: client

      - name: Prepare keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > client/android/app/xiaoyuan.jks
        working-directory: .

      - name: Build release APKs
        run: flutter build apk --release --split-per-abi
        working-directory: client

      - name: Upload arm64-v8a
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64-v8a-release
          path: client/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Upload armeabi-v7a
        uses: actions/upload-artifact@v4
        with:
          name: app-armeabi-v7a-release
          path: client/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk

      - name: Upload x86_64
        uses: actions/upload-artifact@v4
        with:
          name: app-x86_64-release
          path: client/build/app/outputs/flutter-apk/app-x86_64-release.apk
